services:
  web:
    image: ${WEB_IMAGE:-yuhongwei1997/radius-ent:audit-dashboard-v5.0}
    command:
      - gunicorn
      - --bind
      - 0.0.0.0:5000
      - --workers
      - ${GUNICORN_WORKERS:-2}
      - --threads
      - ${GUNICORN_THREADS:-4}
      - --timeout
      - ${GUNICORN_TIMEOUT:-30}
      - app:app
    ports:
      - "5000:5000"
    environment:
      AUDIT_DB_FILE: /data/audit_logs.db
      AUDIT_LOG_DIR: /logs
    volumes:
      # 格式为 - 宿主机路径:容器内路径
      - ./data:/data
      - ./logs:/logs
    restart: unless-stopped

  collector:
    image: ${COLLECTOR_IMAGE:-yuhongwei1997/radius-ent:audit-dashboard-v5.0}
    command: python collector.py
    environment:
      AUDIT_DB_FILE: /data/audit_logs.db
      AUDIT_LOG_DIR: /logs
    volumes:
      - ./data:/data
      - ./logs:/logs
    restart: unless-stopped
