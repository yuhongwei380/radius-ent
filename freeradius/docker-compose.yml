#base on Freeradius v3.2.1 support audit log and audit exporter
services:
  freeradius:
    image: yuhongwei1997/radius-ent:freeradius-azure-v5.0
    container_name: radius-azure-v5
    environment:
      - REALM_NAME=your_domain
      - Azure_App_Client_ID=app_client_id
      #- Azure_App_Client_Secret=app_client_secret
      # Azure_App_Client_Secret和Azure_App_Client_Key_Path&Azure_App_Client_Cert_Path二选一，前者适合测试环境，后者适合生产环境
      - Azure_App_Client_Key_Path=/etc/freeradius/ssl/azure_app_radius_key.pem
      - Azure_App_Client_Cert_Path=/etc/freeradius/ssl/azure_app_radius_cert.pem
      # timeout 健康检查参数：日志中连续出现超时次数达到阈值则判定 unhealthy
      - HC_LOG_FILE=/var/log/freeradius/radius.log
      - "HC_TIMEOUT_PATTERN=users failed: 500 read timeout"
      - HC_TIMEOUT_MAX_HITS=3
    volumes:
      - ./ssl/azure_app_radius_cert.pem:/etc/freeradius/ssl/azure_app_radius_cert.pem
      - ./ssl/azure_app_radius_key.pem:/etc/freeradius/ssl/azure_app_radius_key.pem
      # 如果env中选择了Azure_App_Client_Secret而不是Azure_App_Client_Key_Path&Azure_App_Client_Cert_Path，则上面两行可以注释掉，因为不需要将证书和密钥文件挂载到容器中
      - ./ssl/radius.key:/etc/freeradius/certs/ssl/radius.key
      - ./ssl/radius.crt:/etc/freeradius/certs/ssl/radius.crt
      - ./ssl/radius_ca.pem:/etc/freeradius/certs/ssl/radius_ca.pem
      - ./clients.conf:/etc/freeradius/clients.conf
      - ./timeout-healthcheck.sh:/usr/local/bin/timeout-healthcheck.sh:ro
      # 3. 新增：将容器内的日志目录映射出来，方便在宿主机直接 tail -f 查看计费日志
      - ./logs:/var/log/freeradius
    network_mode: host
    restart: always
    labels:
      - autoheal=true
    # 健康检查：当日志中连续出现多次 oauth2 timeout 时，标记 unhealthy
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/timeout-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========== 新增的审计 Exporter 服务 ==========
  audit-exporter:
    image: yuhongwei1997/radius-ent:audit-exporter-v5.0
    container_name: audit-exporter
    environment:
      - AUDIT_API_TOKEN=fe269087a58d3b98f722f89b
      - AUDIT_STREAM_FILE_PATH=/var/log/freeradius/audit_stream.jsonl
    volumes:
      # 以只读 (ro) 模式挂载日志目录，绝不影响 radius 写入
      - ./logs:/var/log/freeradius:ro
    ports:
      - "${AUDIT_EXPORTER_PORT:-9090}:9090"
    restart: always

  # 监听 unhealthy 容器并自动重启（需要 Docker socket）
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_START_PERIOD=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
